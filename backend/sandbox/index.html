<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Canvas: AI Art Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel { background-color: rgba(31, 41, 55, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(75, 85, 99, 0.3); }.gradient-button { background: linear-gradient(to right, #6366f1, #a855f7); transition: all 0.2s ease-in-out; }.gradient-button:hover { background: linear-gradient(to right, #4f46e5, #9333ea); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(100, 100, 255, 0.2); }.loading-spinner { border: 4px solid rgba(255, 255, 255, 0.2); border-top: 4px solid #a855f7; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }.loading-spinner.hidden { display: none; }@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-940 text-slate-100 min-h-screen">
    <div class="min-h-screen bg-gradient-to-br from-gray-900 to-black text-gray-100 p-8 flex items-center justify-center font-sans"><div class="container mx-auto max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-8"><div id="control-panel" class="glass-panel rounded-2xl p-8 shadow-xl flex flex-col space-y-6"><h2 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-600 mb-6">Aether Canvas</h2><p class="text-gray-300 text-lg mb-8">Unleash your imagination. Describe your vision, choose a style, and let AI bring it to life.</p><div class="flex flex-col space-y-5"><label for="prompt-input" class="text-gray-300 text-sm font-semibold">Art Prompt</label><textarea id="prompt-input" class="w-full p-4 rounded-lg bg-gray-700/50 border border-gray-600 focus:border-indigo-500 focus:ring-indigo-500 focus:ring-1 outline-none transition-all duration-200 text-gray-100 placeholder-gray-400 resize-none h-28" placeholder="A cyberpunk cityscape at dusk, with neon signs and flying cars..."></textarea><label for="style-select" class="text-gray-300 text-sm font-semibold">Art Style</label><select id="style-select" class="w-full p-3 rounded-lg bg-gray-700/50 border border-gray-600 focus:border-indigo-500 focus:ring-indigo-500 focus:ring-1 outline-none transition-all duration-200 text-gray-100"><option value="impressionist">Impressionist</option><option value="cyberpunk">Cyberpunk</option><option value="abstract">Abstract Expressionism</option><option value="surreal">Surrealism</option><option value="fantasy">Fantasy Art</option><option value="minimalist">Minimalist</option></select><label for="palette-select" class="text-gray-300 text-sm font-semibold">Color Palette</label><select id="palette-select" class="w-full p-3 rounded-lg bg-gray-700/50 border border-gray-600 focus:border-indigo-500 focus:ring-indigo-500 focus:ring-1 outline-none transition-all duration-200 text-gray-100"><option value="vibrant">Vibrant & Bold</option><option value="monochromatic">Monochromatic</option><option value="earthy">Earthy Tones</option><option value="pastel">Soft Pastels</option><option value="dark-moody">Dark & Moody</option></select><button id="generate-btn" class="gradient-button text-white font-bold py-4 px-6 rounded-xl text-lg shadow-lg hover:shadow-xl transition-all duration-300 ease-in-out mt-6 flex items-center justify-center"><span id="generate-text">Generate Art</span><div id="loading-spinner" class="loading-spinner ml-3 hidden"></div></button></div></div><div id="display-panel" class="glass-panel rounded-2xl p-8 shadow-xl flex flex-col items-center justify-center relative"><h3 class="text-3xl font-bold text-gray-200 mb-6">Your Masterpiece</h3><div class="w-full h-96 bg-gray-800 rounded-lg overflow-hidden flex items-center justify-center border border-gray-700 relative"><img id="art-image" src="" alt="Generated Art" class="max-w-full max-h-full object-contain rounded-lg hidden" /><p id="placeholder-text" class="text-gray-500 text-lg">Your generated art will appear here.</p></div><button id="download-btn" class="gradient-button text-white font-bold py-3 px-5 rounded-xl text-md shadow-md mt-8 opacity-50 cursor-not-allowed" disabled>Download Art</button></div></div></div>
    <script>
        // Self-contained logic loop
        (function() {
            document.addEventListener('DOMContentLoaded', () => { const promptInput = document.getElementById('prompt-input'); const styleSelect = document.getElementById('style-select'); const paletteSelect = document.getElementById('palette-select'); const generateBtn = document.getElementById('generate-btn'); const generateText = document.getElementById('generate-text'); const loadingSpinner = document.getElementById('loading-spinner'); const artImage = document.getElementById('art-image'); const placeholderText = document.getElementById('placeholder-text'); const downloadBtn = document.getElementById('download-btn'); if (!promptInput || !styleSelect || !paletteSelect || !generateBtn || !generateText || !loadingSpinner || !artImage || !placeholderText || !downloadBtn) { console.error('One or more essential DOM elements not found.'); return; } const generateArt = async () => { if (!generateBtn || !loadingSpinner || !generateText || !artImage || !placeholderText || !downloadBtn) return; generateBtn.disabled = true; generateBtn.classList.add('opacity-50', 'cursor-not-allowed'); generateText.textContent = 'Generating...'; loadingSpinner.classList.remove('hidden'); artImage.classList.add('hidden'); placeholderText.classList.remove('hidden'); downloadBtn.disabled = true; downloadBtn.classList.add('opacity-50', 'cursor-not-allowed'); const prompt = promptInput.value.trim(); const style = styleSelect.value; const palette = paletteSelect.value; const seed = `${prompt.replace(/[^a-zA-Z0-9]/g, '') || 'abstract'}-${style}-${palette}`; const imageUrl = `https://picsum.photos/seed/${seed}/800/600`; await new Promise(resolve => setTimeout(resolve, 2500)); artImage.src = imageUrl; artImage.onload = () => { if (!artImage || !placeholderText) return; artImage.classList.remove('hidden'); placeholderText.classList.add('hidden'); }; artImage.onerror = () => { if (!artImage || !placeholderText) return; artImage.classList.add('hidden'); placeholderText.classList.remove('hidden'); placeholderText.textContent = 'Failed to load image. Try again.'; }; if (!generateBtn || !loadingSpinner || !generateText || !downloadBtn) return; generateBtn.disabled = false; generateBtn.classList.remove('opacity-50', 'cursor-not-allowed'); generateText.textContent = 'Generate Art'; loadingSpinner.classList.add('hidden'); downloadBtn.disabled = false; downloadBtn.classList.remove('opacity-50', 'cursor-not-allowed'); }; const downloadArt = () => { if (!artImage || !artImage.src || artImage.classList.contains('hidden')) { alert('No art to download!'); return; } const link = document.createElement('a'); link.href = artImage.src; link.download = 'aether-canvas-art.jpg'; document.body.appendChild(link); link.click(); document.body.removeChild(link); }; generateBtn.addEventListener('click', generateArt); downloadBtn.addEventListener('click', downloadArt); promptInput.value = 'A serene forest with bioluminescent flora under a starry night sky'; });
        })();
    </script>
</body>
</html>
