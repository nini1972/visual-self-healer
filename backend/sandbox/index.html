<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Serenity Greeter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } } #greeter-container #greeting-message, #greeter-container #current-time, #greeter-container #dynamic-quote { opacity: 0; transform: translateY(20px); } .is-loaded #greeting-message { animation: fade-in-up 0.8s ease-out forwards; } .is-loaded #current-time { animation: fade-in-up 0.8s ease-out 0.1s forwards; } .is-loaded #dynamic-quote { animation: fade-in-up 0.8s ease-out 0.2s forwards; } #greeter-card { background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-940 text-slate-100 min-h-screen">
    <div id="greeter-container" class="min-h-screen flex items-center justify-center p-4 transition-colors duration-1000 ease-in-out bg-gradient-to-br"> <div id="greeter-card" class="relative z-10 p-8 md:p-12 rounded-3xl shadow-2xl text-center max-w-lg w-full text-white transform transition-all duration-700 ease-in-out scale-95 hover:scale-100"> <p id="greeting-message" class="text-3xl md:text-5xl font-extrabold mb-4 drop-shadow-lg"></p> <h1 id="current-time" class="text-5xl md:text-7xl font-light tracking-tight mb-6 drop-shadow-lg"></h1> <p id="dynamic-quote" class="text-lg md:text-xl font-light italic"></p> </div></div>
    <script>
        // Self-contained logic loop
        (function() {
            function updateGreeter() { const now = new Date(); const hours = now.getHours(); const minutes = now.getMinutes(); const seconds = now.getSeconds(); const greetingMessageElement = document.getElementById('greeting-message'); const currentTimeElement = document.getElementById('current-time'); const dynamicQuoteElement = document.getElementById('dynamic-quote'); const greeterContainer = document.getElementById('greeter-container'); if (!greetingMessageElement || !currentTimeElement || !dynamicQuoteElement || !greeterContainer) { console.error("One or more greeter elements not found."); return; } const ampm = hours >= 12 ? 'PM' : 'AM'; const displayHours = hours % 12 || 12; const displayMinutes = minutes < 10 ? '0' + minutes : minutes; const displaySeconds = seconds < 10 ? '0' + seconds : seconds; currentTimeElement.textContent = `${displayHours}:${displayMinutes}:${displaySeconds} ${ampm}`; let greeting = ''; let quote = ''; let fromColorClass = ''; let toColorClass = ''; if (hours >= 5 && hours < 12) { greeting = "Good Morning!"; quote = "Embrace the beauty of a new day."; fromColorClass = 'from-blue-400'; toColorClass = 'to-indigo-600'; } else if (hours >= 12 && hours < 17) { greeting = "Good Afternoon!"; quote = "May your afternoon be productive and joyful."; fromColorClass = 'from-yellow-300'; toColorClass = 'to-orange-500'; } else if (hours >= 17 && hours < 21) { greeting = "Good Evening!"; quote = "Relax and unwind after a long day."; fromColorClass = 'from-purple-600'; toColorClass = 'to-pink-800'; } else { greeting = "Good Night!"; quote = "Rest well and dream sweet dreams."; fromColorClass = 'from-gray-800'; toColorClass = 'to-black'; } greetingMessageElement.textContent = greeting; dynamicQuoteElement.textContent = quote; const currentFromClass = Array.from(greeterContainer.classList).find(cls => cls.startsWith('from-')); const currentToClass = Array.from(greeterContainer.classList).find(cls => cls.startsWith('to-')); if (currentFromClass && currentFromClass !== fromColorClass) { greeterContainer.classList.remove(currentFromClass); } if (currentToClass && currentToClass !== toColorClass) { greeterContainer.classList.remove(currentToClass); } if (!greeterContainer.classList.contains(fromColorClass)) { greeterContainer.classList.add(fromColorClass); } if (!greeterContainer.classList.contains(toColorClass)) { greeterContainer.classList.add(toColorClass); } } document.addEventListener('DOMContentLoaded', () => { const greeterContainer = document.getElementById('greeter-container'); if (greeterContainer) { updateGreeter(); greeterContainer.classList.add('is-loaded'); setInterval(updateGreeter, 1000); } });
        })();
    </script>
</body>
</html>
