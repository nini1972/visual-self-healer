<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Field Genesis</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0d12; color: #e0e0e0; } .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); } .btn-primary { transition: all 0.2s ease-in-out; } .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(79, 70, 229, 0.4); } .btn-secondary { transition: all 0.2s ease-in-out; } .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(107, 114, 128, 0.2); } @keyframes pulse-glow { 0% { box-shadow: 0 0 5px rgba(125, 211, 252, 0.4); } 50% { box-shadow: 0 0 15px rgba(125, 211, 252, 0.8), 0 0 25px rgba(125, 211, 252, 0.6); } 100% { box-shadow: 0 0 5px rgba(125, 211, 252, 0.4); } } .canvas-glow { animation: pulse-glow 3s infinite alternate; }
    </style>
</head>
<body class="bg-slate-940 text-slate-100 min-h-screen">
    <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-900 to-black"> <div class="glass-card p-8 rounded-xl shadow-2xl max-w-4xl w-full"> <h1 class="text-4xl font-extrabold text-center mb-8 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-600">Quantum Field Genesis</h1> <p class="text-center text-gray-400 mb-8 max-w-2xl mx-auto">Witness the pseudo-random emergence of cosmic structures in a simulated quantum field, representing moments of universe creation.</p> <div class="flex flex-col lg:flex-row gap-8"> <div class="flex-1 flex justify-center items-center"> <canvas id="quantumCanvas" width="600" height="600" class="bg-black rounded-lg border border-blue-700 shadow-lg canvas-glow"></canvas> </div> <div class="flex-1 flex flex-col justify-between"> <div class="mb-6"> <h2 class="text-2xl font-bold text-blue-300 mb-4">Simulation Controls</h2> <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"> <button id="toggleSimulationBtn" class="btn-primary bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md">Start Simulation</button> <button id="resetSimulationBtn" class="btn-secondary bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 px-6 rounded-lg shadow-md">Reset Field</button> </div> <div class="mb-4"> <label for="speedSlider" class="block text-gray-300 text-sm font-medium mb-2">Evolution Speed:</label> <input type="range" id="speedSlider" min="10" max="200" value="50" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer range-lg"> <div class="flex justify-between text-xs text-gray-400 mt-1"> <span>Fast</span> <span>Slow</span> </div> </div> <div class="mb-4"> <label for="densitySlider" class="block text-gray-300 text-sm font-medium mb-2">Initial Density:</label> <input type="range" id="densitySlider" min="1" max="10" value="3" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer range-lg"> <div class="flex justify-between text-xs text-gray-400 mt-1"> <span>Sparse</span> <span>Dense</span> </div> </div> </div> <div class="bg-gray-800 p-4 rounded-lg"> <h3 class="text-xl font-bold text-purple-300 mb-2">Field Metrics</h3> <p class="text-gray-400">Generation: <span id="generationCount" class="font-semibold text-white">0</span></p> <p class="text-gray-400">Active Pixels: <span id="activePixelsCount" class="font-semibold text-white">0</span></p> </div> </div> </div> <div class="mt-8 text-center text-gray-500 text-sm"> <p>&copy; 2023 Quantum Simulations. All rights reserved.</p> </div> </div></div>
    <script>
        // Self-contained logic loop
        (function() {
            document.addEventListener('DOMContentLoaded', () => { const canvas = document.getElementById('quantumCanvas'); const toggleSimulationBtn = document.getElementById('toggleSimulationBtn'); const resetSimulationBtn = document.getElementById('resetSimulationBtn'); const speedSlider = document.getElementById('speedSlider'); const densitySlider = document.getElementById('densitySlider'); const generationCountSpan = document.getElementById('generationCount'); const activePixelsCountSpan = document.getElementById('activePixelsCount'); if (!canvas || !toggleSimulationBtn || !resetSimulationBtn || !speedSlider || !densitySlider || !generationCountSpan || !activePixelsCountSpan) { console.error('One or more essential DOM elements not found.'); return; } const ctx = canvas.getContext('2d'); if (!ctx) { console.error('Failed to get 2D rendering context for canvas.'); return; } const WIDTH = canvas.width; const HEIGHT = canvas.height; const PIXEL_SIZE = 4; const GRID_WIDTH = WIDTH / PIXEL_SIZE; const GRID_HEIGHT = HEIGHT / PIXEL_SIZE; let grid = []; let isRunning = false; let animationFrameId = null; let generation = 0; let evolutionSpeed = 50; // Milliseconds per update let lastUpdateTime = 0; // HSL color representation {h, s, l} function hslToRgb(h, s, l) { s /= 100; l /= 100; let c = (1 - Math.abs(2 * l - 1)) * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = l - c / 2, r = 0, g = 0, b = 0; if (0 <= h && h < 60) { r = c; g = x; b = 0; } else if (60 <= h && h < 120) { r = x; g = c; b = 0; } else if (120 <= h && h < 180) { r = 0; g = c; b = x; } else if (180 <= h && h < 240) { r = 0; g = x; b = c; } else if (240 <= h && h < 300) { r = x; g = 0; b = c; } else if (300 <= h && h < 360) { r = c; g = 0; b = x; } r = Math.round((r + m) * 255); g = Math.round((g + m) * 255); b = Math.round((b + m) * 255); return `rgb(${r},${g},${b})`; } function initGrid() { grid = []; generation = 0; let initialDensity = parseInt(densitySlider.value); for (let y = 0; y < GRID_HEIGHT; y++) { grid[y] = []; for (let x = 0; x < GRID_WIDTH; x++) { // Initialize with dark, almost black pixels, with some random 'seeds' const isSeed = Math.random() * 100 < initialDensity; grid[y][x] = { h: isSeed ? Math.random() * 360 : 240, // Random hue for seeds, deep blue for others s: isSeed ? 80 + Math.random() * 20 : 10, // High saturation for seeds, low for others l: isSeed ? 70 + Math.random() * 30 : 0 // Bright for seeds, black for others }; } } updateMetrics(); drawGrid(); } function drawGrid() { if (!ctx) return; ctx.clearRect(0, 0, WIDTH, HEIGHT); let activePixels = 0; for (let y = 0; y < GRID_HEIGHT; y++) { for (let x = 0; x < GRID_WIDTH; x++) { const pixel = grid[y][x]; if (pixel.l > 0) { // Only draw if not completely black ctx.fillStyle = hslToRgb(pixel.h, pixel.s, pixel.l); ctx.fillRect(x * PIXEL_SIZE, y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE); activePixels++; } } } activePixelsCountSpan.textContent = activePixels.toString(); } function updateGrid() { const newGrid = JSON.parse(JSON.stringify(grid)); // Deep copy for next state let decayRate = 0.5; // How fast lightness fades let spreadFactor = 0.1; // How much lightness spreads from neighbors let hueShiftFactor = 5; // Max random hue shift let saturationBoost = 5; // Max saturation boost from neighbors let birthChance = 0.00005; // Chance for a new 'seed' to appear (per pixel) for (let y = 0; y < GRID_HEIGHT; y++) { for (let x = 0; x < GRID_WIDTH; x++) { const currentPixel = grid[y][x]; let newPixel = newGrid[y][x]; // Apply decay newPixel.l = Math.max(0, currentPixel.l - decayRate); // Influence from neighbors let neighborLightnessSum = 0; let neighborHueSum = 0; let neighborCount = 0; for (let dy = -1; dy <= 1; dy++) { for (let dx = -1; dx <= 1; dx++) { if (dx === 0 && dy === 0) continue; const nx = x + dx; const ny = y + dy; if (nx >= 0 && nx < GRID_WIDTH && ny >= 0 && ny < GRID_HEIGHT) { const neighbor = grid[ny][nx]; if (neighbor.l > 0) { neighborLightnessSum += neighbor.l; // For hue averaging, we need to handle wrapping. A simple average might not be best. // For now, let's just sum and average, it will still show some blending. neighborHueSum += neighbor.h; } neighborCount++; } } } if (neighborCount > 0) { // Spread lightness newPixel.l = Math.min(100, newPixel.l + (neighborLightnessSum / neighborCount) * spreadFactor); // Average hue if enough light neighbors if (currentPixel.l > 10 || neighborLightnessSum > 50) { // Only influence hue if there's some light newPixel.h = (currentPixel.h * 0.7 + (neighborHueSum / neighborCount) * 0.3 + (Math.random() - 0.5) * hueShiftFactor) % 360; if (newPixel.h < 0) newPixel.h += 360; newPixel.s = Math.min(100, currentPixel.s + (neighborLightnessSum / (neighborCount * 100)) * saturationBoost); } } // Random 'birth' of new energy if (Math.random() < birthChance) { newPixel.l = 100; newPixel.s = 100; newPixel.h = Math.random() * 360; } // Ensure lightness and saturation are within bounds newPixel.l = Math.min(100, Math.max(0, newPixel.l)); newPixel.s = Math.min(100, Math.max(0, newPixel.s)); } } grid = newGrid; generation++; updateMetrics(); } function updateMetrics() { generationCountSpan.textContent = generation.toString(); } function animate(currentTime) { if (!isRunning) { animationFrameId = null; return; } if (currentTime - lastUpdateTime > evolutionSpeed) { updateGrid(); drawGrid(); lastUpdateTime = currentTime; } animationFrameId = requestAnimationFrame(animate); } function startSimulation() { if (!isRunning) { isRunning = true; toggleSimulationBtn.textContent = 'Pause Simulation'; lastUpdateTime = performance.now(); // Reset last update time to prevent immediate update after starting animationFrameId = requestAnimationFrame(animate); } } function pauseSimulation() { if (isRunning) { isRunning = false; toggleSimulationBtn.textContent = 'Start Simulation'; if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; } } } function toggleSimulation() { if (isRunning) { pauseSimulation(); } else { startSimulation(); } } function resetSimulation() { pauseSimulation(); initGrid(); toggleSimulationBtn.textContent = 'Start Simulation'; } // Event Listeners toggleSimulationBtn.addEventListener('click', toggleSimulation); resetSimulationBtn.addEventListener('click', resetSimulation); speedSlider.addEventListener('input', (e) => { evolutionSpeed = 210 - parseInt(e.target.value); // Invert slider for intuitive speed control }); // Initial setup initGrid(); // Start simulation automatically after initial setup startSimulation(); });
        })();
    </script>
</body>
</html>
