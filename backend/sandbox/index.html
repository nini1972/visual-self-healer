<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quantum Genesis Field</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&amp;family=Inter:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"><script src="https://cdn.tailwindcss.com"></script></script>
<style>
        /* Custom CSS for subtle effects and glassmorphism */.glass-container {  backdrop-filter: blur(10px) saturate(180%);  -webkit-backdrop-filter: blur(10px) saturate(180%);  background-color: rgba(255, 255, 255, 0.05);  border: 1px solid rgba(255, 255, 255, 0.1);  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);}.canvas-glow {  box-shadow: 0 0 40px rgba(173, 216, 230, 0.6), 0 0 80px rgba(147, 112, 219, 0.4);  transition: box-shadow 0.5s ease-in-out;}@keyframes pulseGlow {  0% {    box-shadow: 0 0 30px rgba(173, 216, 230, 0.5), 0 0 60px rgba(147, 112, 219, 0.3);  }  50% {    box-shadow: 0 0 50px rgba(173, 216, 230, 0.8), 0 0 100px rgba(147, 112, 219, 0.6);  }  100% {    box-shadow: 0 0 30px rgba(173, 216, 230, 0.5), 0 0 60px rgba(147, 112, 219, 0.3);  }}.animate-pulseGlow {  animation: pulseGlow 2s infinite alternate ease-in-out;}
    </style>
</head>
<body class="bg-slate-940 text-slate-100 min-h-screen">
<div class="min-h-screen bg-gradient-to-br from-gray-950 to-black flex flex-col items-center justify-center p-4 font-sans text-white relative overflow-hidden"><div class="absolute inset-0 z-0 opacity-20" style="background-image: radial-gradient(circle at center, rgba(100, 0, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at top left, rgba(0, 200, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at bottom right, rgba(255, 0, 150, 0.1) 0%, transparent 50%);"><div class="absolute inset-0 z-0 opacity-30" style="background-image: radial-gradient(circle at center, rgba(100, 0, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at top left, rgba(0, 200, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at bottom right, rgba(255, 0, 150, 0.1) 0%, transparent 50%);"></div></div><h1 class="text-5xl md:text-6xl font-extrabold mb-12 text-center leading-tight tracking-tight drop-shadow-lg z-10" style="background: linear-gradient(45deg, #e0b0ff, #a0d9ff, #ff80ed); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Quantum Genesis Field</h1><div class="relative w-full max-w-4xl aspect-video rounded-3xl overflow-hidden glass-container p-2 md:p-4 z-10 transform transition-all duration-500 hover:scale-[1.01]" id="canvas-container"><canvas class="w-full h-full rounded-2xl canvas-glow" id="quantumCanvas"></canvas><div class="absolute inset-0 pointer-events-none rounded-2xl border border-white/10"></div></div><p class="mt-8 text-lg text-gray-400 text-center max-w-2xl z-10"><p class="mt-8 text-lg text-gray-300 text-center max-w-2xl z-10">Witness the ephemeral dance of energy and matter, simulating the birth of cosmic structures in a pseudo-random quantum field.</p></p></div>
<script>        // Self-contained logic loop        (function() {            document.addEventListener('DOMContentLoaded', () => {  const canvas = document.getElementById('quantumCanvas');  const canvasContainer = document.getElementById('canvas-container');  if (!canvas || !canvasContainer) {    console.error('Canvas or canvas container not found!');    return;  }  const ctx = canvas.getContext('2d');  if (!ctx) {    console.error('2D context not supported!');    return;  }  let animationFrameId;  const resizeCanvas = () => {    const containerRect = canvasContainer.getBoundingClientRect();    canvas.width = containerRect.width;    canvas.height = containerRect.height;  };  window.addEventListener('resize', resizeCanvas);  resizeCanvas();  const particles = [];  const maxParticles = 400;  const particleBaseSize = 1.5;  const creationRate = 0.08; // Chance per frame to create a new particle  const maxAge = 200; // Frames  const creationBurstChance = 0.005; // Chance for a large burst  const burstParticles = 20;  class Particle {    constructor(x, y, isBurst = false) {      this.x = x;      this.y = y;      this.vx = (Math.random() - 0.5) * 2;      this.vy = (Math.random() - 0.5) * 2;      this.age = 0;      this.maxAge = maxAge * (0.8 + Math.random() * 0.4); // Vary max age      this.energy = 1; // Used for color/alpha      this.color = this.getRandomColor(isBurst);      this.size = particleBaseSize * (isBurst ? 1.5 : 1);    }    getRandomColor(isBurst) {      const burstColors = [        '#e0b0ff', // Light purple        '#a0d9ff', // Light blue        '#ff80ed', // Pink        '#8aff80', // Light green        '#ffff80'  // Light yellow      ];      if (isBurst) {        return burstColors[Math.floor(Math.random() * burstColors.length)];      }      const subtleColors = [        'rgba(173, 216, 230, 0.8)', // Light blue        'rgba(147, 112, 219, 0.8)', // Medium purple        'rgba(255, 105, 180, 0.8)', // Hot pink        'rgba(100, 149, 237, 0.8)', // Cornflower blue        'rgba(255, 255, 255, 0.8)'  // White      ];      return subtleColors[Math.floor(Math.random() * subtleColors.length)];    }    update() {      this.x += this.vx;      this.y += this.vy;      this.vx += (Math.random() - 0.5) * 0.1; // Add slight random jitter      this.vy += (Math.random() - 0.5) * 0.1;      this.vx *= 0.99; // Decay velocity      this.vy *= 0.99;      this.age++;      this.energy = 1 - (this.age / this.maxAge);      if (this.x < 0) this.x = canvas.width;      if (this.x > canvas.width) this.x = 0;      if (this.y < 0) this.y = canvas.height;      if (this.y > canvas.height) this.y = 0;    }    draw(context) {      context.beginPath();      context.arc(this.x, this.y, this.size * this.energy, 0, Math.PI * 2);      let finalColor;      if (this.color.startsWith('rgba')) {        const rgbaMatch = this.color.match(/rgba\((\d{1,3}),\s*(\d{1,3}),\s*(\d{1,3}),\s*([\d.]+)\)/);        if (rgbaMatch) {          finalColor = `rgba(${rgbaMatch[1]}, ${rgbaMatch[2]}, ${rgbaMatch[3]}, ${this.energy * 0.8})`;        } else {          finalColor = `rgba(255, 255, 255, ${this.energy * 0.8})`; // Fallback        }      } else if (this.color.startsWith('#')) {        const hex = this.color.slice(1);        const r = parseInt(hex.substring(0, 2), 16);        const g = parseInt(hex.substring(2, 4), 16);        const b = parseInt(hex.substring(4, 6), 16);        finalColor = `rgba(${r}, ${g}, ${b}, ${this.energy * 0.8})`;      } else {        finalColor = `rgba(255, 255, 255, ${this.energy * 0.8})`; // Default fallback      }      context.fillStyle = finalColor;      context.shadowBlur = 5 * this.energy;      context.shadowColor = finalColor; // Shadow matches particle color      context.fill();    }  }  const spawnParticle = (isBurst = false, x = Math.random() * canvas.width, y = Math.random() * canvas.height) => {    particles.push(new Particle(x, y, isBurst));  };  const animate = () => {    ctx.fillStyle = 'rgba(0, 0, 0, 0.08)'; // Semi-transparent overlay for trails    ctx.fillRect(0, 0, canvas.width, canvas.height);    ctx.shadowBlur = 0; // Reset canvas shadow for individual particle drawing    ctx.shadowColor = 'transparent';    if (Math.random() < creationRate && particles.length < maxParticles) {      spawnParticle();    }    if (Math.random() < creationBurstChance && particles.length < maxParticles - burstParticles) {      const burstX = Math.random() * canvas.width;      const burstY = Math.random() * canvas.height;      for (let i = 0; i < burstParticles; i++) {        spawnParticle(true, burstX, burstY);      }    }    for (let i = particles.length - 1; i >= 0; i--) {      const p = particles[i];      p.update();      p.draw(ctx);      if (p.age > p.maxAge || p.energy <= 0.05) {        particles.splice(i, 1);      }    }    animationFrameId = requestAnimationFrame(animate);  };  for (let i = 0; i < 50; i++) { // Initial particles  spawnParticle();  }  animate();  canvasContainer.addEventListener('mouseenter', () => {    canvasContainer.classList.add('animate-pulseGlow');  });  canvasContainer.addEventListener('mouseleave', () => {    canvasContainer.classList.remove('animate-pulseGlow');  });});        })();</script>
</body>
</html>
