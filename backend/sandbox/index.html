<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>

<title>AuraFlow Landing</title>

<script src="https://cdn.tailwindcss.com">// Self-contained logic loop(function() {class Particle { constructor(x, y, vx, vy, color) { this.x = x; this.y = y; this.vx = vx + (Math.random() - 0.5) * 2; this.vy = vy + (Math.random() - 0.5) * 2; this.size = Math.random() * 5 + 2; this.color = color; this.alpha = 1; this.life = 0; this.maxLife = Math.random() * 100 + 50; } update() { this.x += this.vx; this.y += this.vy; this.alpha -= 1 / this.maxLife; this.size -= 0.05; this.life++; } draw(ctx) { if (this.size > 0 && this.alpha > 0) { ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore(); } } } const pixelCanvas = document.getElementById('pixel-canvas'); const webcamFeed = document.getElementById('webcam-feed'); const heroOverlay = document.getElementById('hero-overlay'); const loadingMessage = document.getElementById('loading-message'); const ctaButton = document.getElementById('cta-button'); let ctx; let particles = []; let mouse = { x: 0, y: 0, px: 0, py: 0, isMoving: false }; let touch = { x: 0, y: 0, px: 0, py: 0, isMoving: false }; let animationFrameId; const colors = ['#8A2BE2', '#4B0082', '#9400D3', '#FF00FF', '#DA70D6', '#BA55D3']; function resizeCanvas() { if (pixelCanvas) { pixelCanvas.width = window.innerWidth; pixelCanvas.height = window.innerHeight; } } function init() { if (pixelCanvas && webcamFeed && heroOverlay && loadingMessage && ctaButton) { ctx = pixelCanvas.getContext('2d'); resizeCanvas(); window.addEventListener('resize', resizeCanvas); setupWebcam(); pixelCanvas.addEventListener('mousemove', handleMouseMove); pixelCanvas.addEventListener('touchmove', handleTouchMove, { passive: false }); pixelCanvas.addEventListener('mouseleave', () => mouse.isMoving = false); pixelCanvas.addEventListener('touchend', () => touch.isMoving = false); ctaButton.addEventListener('click', () => { if (heroOverlay) heroOverlay.style.display = 'none'; }); animate(); } } async function setupWebcam() { if (webcamFeed && loadingMessage && heroOverlay && ctaButton) { try { const stream = await navigator.mediaDevices.getUserMedia({ video: true }); webcamFeed.srcObject = stream; webcamFeed.onloadedmetadata = () => { webcamFeed.play(); loadingMessage.style.display = 'none'; }; } catch (err) { console.error('Error accessing webcam:', err); loadingMessage.textContent = 'Webcam unavailable. Try moving your mouse!'; heroOverlay.style.display = 'none'; ctaButton.style.display = 'none'; } } } function handleMouseMove(e) { mouse.isMoving = true; mouse.px = mouse.x; mouse.py = mouse.y; mouse.x = e.clientX; mouse.y = e.clientY; addParticles(mouse.x, mouse.y, mouse.x - mouse.px, mouse.y - mouse.py); } function handleTouchMove(e) { e.preventDefault(); if (e.touches.length > 0) { touch.isMoving = true; const touchX = e.touches[0].clientX; const touchY = e.touches[0].clientY; touch.px = touch.x; touch.py = touch.y; touch.x = touchX; touch.y = touchY; addParticles(touch.x, touch.y, touch.x - touch.px, touch.y - touch.py); } } function addParticles(x, y, dx, dy) { const count = Math.min(Math.abs(dx) + Math.abs(dy), 10); for (let i = 0; i < count; i++) { const color = colors[Math.floor(Math.random() * colors.length)]; particles.push(new Particle(x, y, dx * 0.1, dy * 0.1, color)); } } function animate() { animationFrameId = requestAnimationFrame(animate); if (ctx) { ctx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height); for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(ctx); if (particles[i].life > particles[i].maxLife || particles[i].size <= 0 || particles[i].alpha <= 0) { particles.splice(i, 1); } } } } document.addEventListener('DOMContentLoaded', init);})();</script>
<style>
        body { font-family: 'Inter', sans-serif; } .glass-effect { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.125); } .no-scroll { overflow: hidden; }

<div class="relative w-screen h-screen bg-gradient-to-br from-gray-900 to-black overflow-hidden no-scroll" id="app-container"> <video autoplay="" class="absolute inset-0 w-full h-full object-cover opacity-20 blur-sm" id="webcam-feed" muted="" playsinline=""></video> <canvas class="absolute inset-0 z-10" id="pixel-canvas"></canvas> <div class="absolute inset-0 z-20 flex flex-col items-center justify-center p-8 text-white text-center" id="hero-overlay"> <div class="glass-effect rounded-3xl p-10 max-w-3xl mx-auto shadow-2xl"> <h1 class="text-6xl md:text-8xl font-extrabold mb-6 tracking-tight leading-tight drop-shadow-lg">AuraFlow</h1> <p class="text-xl md:text-2xl text-gray-300 mb-8 font-light">Experience the ethereal dance of pixels, guided by your presence.</p> <button class="px-8 py-4 bg-gradient-to-r from-purple-600 to-indigo-700 text-white text-lg font-semibold rounded-full shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300 ease-in-out focus:outline-none focus:ring-4 focus:ring-purple-500 focus:ring-opacity-50" id="cta-button">Start the Journey</button> </div> <p class="absolute bottom-8 text-gray-400 text-sm animate-pulse" id="loading-message">Awaiting webcam access...</p> </div></div>
<script>// Self-contained logic loop(function() {class Particle { constructor(x, y, vx, vy, color) { this.x = x; this.y = y; this.vx = vx + (Math.random() - 0.5) * 2; this.vy = vy + (Math.random() - 0.5) * 2; this.size = Math.random() * 5 + 2; this.color = color; this.alpha = 1; this.life = 0; this.maxLife = Math.random() * 100 + 50; } update() { this.x += this.vx; this.y += this.vy; this.alpha -= 1 / this.maxLife; this.size -= 0.05; this.life++; } draw(ctx) { if (this.size > 0 && this.alpha > 0) { ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore(); } } } const pixelCanvas = document.getElementById('pixel-canvas'); const webcamFeed = document.getElementById('webcam-feed'); const heroOverlay = document.getElementById('hero-overlay'); const loadingMessage = document.getElementById('loading-message'); const ctaButton = document.getElementById('cta-button'); let ctx; let particles = []; let mouse = { x: 0, y: 0, px: 0, py: 0, isMoving: false }; let touch = { x: 0, y: 0, px: 0, py: 0, isMoving: false }; let animationFrameId; const colors = ['#8A2BE2', '#4B0082', '#9400D3', '#FF00FF', '#DA70D6', '#BA55D3']; function resizeCanvas() { if (pixelCanvas) { pixelCanvas.width = window.innerWidth; pixelCanvas.height = window.innerHeight; } } function init() { if (pixelCanvas && webcamFeed && heroOverlay && loadingMessage && ctaButton) { ctx = pixelCanvas.getContext('2d'); resizeCanvas(); window.addEventListener('resize', resizeCanvas); setupWebcam(); pixelCanvas.addEventListener('mousemove', handleMouseMove); pixelCanvas.addEventListener('touchmove', handleTouchMove, { passive: false }); pixelCanvas.addEventListener('mouseleave', () => mouse.isMoving = false); pixelCanvas.addEventListener('touchend', () => touch.isMoving = false); ctaButton.addEventListener('click', () => { if (heroOverlay) heroOverlay.style.display = 'none'; }); animate(); } } async function setupWebcam() { if (webcamFeed && loadingMessage) { try { const stream = await navigator.mediaDevices.getUserMedia({ video: true }); webcamFeed.srcObject = stream; webcamFeed.onloadedmetadata = () => { webcamFeed.play(); if (loadingMessage) loadingMessage.style.display = 'none'; }; } catch (err) { console.error('Error accessing webcam:', err); if (loadingMessage) loadingMessage.textContent = 'Webcam access denied or unavailable.'; if (heroOverlay) heroOverlay.style.display = 'none'; if (ctaButton) ctaButton.style.display = 'none'; } } } function handleMouseMove(e) { mouse.isMoving = true; mouse.px = mouse.x; mouse.py = mouse.y; mouse.x = e.clientX; mouse.y = e.clientY; addParticles(mouse.x, mouse.y, mouse.x - mouse.px, mouse.y - mouse.py); } function handleTouchMove(e) { e.preventDefault(); if (e.touches.length > 0) { touch.isMoving = true; const touchX = e.touches[0].clientX; const touchY = e.touches[0].clientY; touch.px = touch.x; touch.py = touch.y; touch.x = touchX; touch.y = touchY; addParticles(touch.x, touch.y, touch.x - touch.px, touch.y - touch.py); } } function addParticles(x, y, dx, dy) { const count = Math.min(Math.abs(dx) + Math.abs(dy), 10); for (let i = 0; i < count; i++) { const color = colors[Math.floor(Math.random() * colors.length)]; particles.push(new Particle(x, y, dx * 0.1, dy * 0.1, color)); } } function animate() { animationFrameId = requestAnimationFrame(animate); if (ctx) { ctx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height); for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(ctx); if (particles[i].life > particles[i].maxLife || particles[i].size <= 0 || particles[i].alpha <= 0) { particles.splice(i, 1); } } } } document.addEventListener('DOMContentLoaded', init);})();</script>
