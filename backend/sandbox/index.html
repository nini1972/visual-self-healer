<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>AetherSynth - Neumorphic Synthesizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neumorphic-base: #e0e0e0; --neumorphic-light: #ffffff; --neumorphic-dark: #a3b1c6; --glow-color: #6366f1; /* Indigo-500 */ } .neumorphic-base { background-color: var(--neumorphic-base); } .shadow-neumorphic-out { box-shadow: 8px 8px 16px var(--neumorphic-dark), -8px -8px 16px var(--neumorphic-light); } .shadow-neumorphic-in { box-shadow: inset 6px 6px 12px var(--neumorphic-dark), inset -6px -6px 12px var(--neumorphic-light); } .shadow-glow { box-shadow: 0 0 15px var(--glow-color), 0 0 30px var(--glow-color), 0 0 45px var(--glow-color); } .shadow-glow-active { box-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color), 0 0 60px var(--glow-color); } input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 10px; background: var(--neumorphic-base); border-radius: 5px; outline: none; box-shadow: inset 2px 2px 4px var(--neumorphic-dark), inset -2px -2px 4px var(--neumorphic-light); } input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--glow-color); cursor: pointer; box-shadow: 0 0 8px var(--glow-color); margin-top: -7px; } input[type="range"]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: var(--glow-color); cursor: pointer; box-shadow: 0 0 8px var(--glow-color); } .key-pressed { transform: scale(0.95); box-shadow: inset 3px 3px 6px var(--neumorphic-dark), inset -3px -3px 6px var(--neumorphic-light); transition: transform 0.05s ease-out, box-shadow 0.05s ease-out; } .toggle-switch { position: relative; display: inline-block; width: 60px; height: 34px; } .toggle-switch input { opacity: 0; width: 0; height: 0; } .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--neumorphic-base); transition: .4s; border-radius: 34px; box-shadow: inset 3px 3px 6px var(--neumorphic-dark), inset -3px -3px 6px var(--neumorphic-light); } .toggle-slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: var(--neumorphic-light); transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); } input:checked + .toggle-slider { background-color: var(--glow-color); box-shadow: 0 0 10px var(--glow-color), inset 3px 3px 6px rgba(0,0,0,0.2), inset -3px -3px 6px rgba(255,255,255,0.5); } input:checked + .toggle-slider:before { transform: translateX(26px); background-color: var(--neumorphic-light); }

</head>
<body class="bg-slate-940 text-slate-100 min-h-screen">
    <div id="synth-dashboard" class="min-h-screen flex items-center justify-center p-4 neumorphic-base text-gray-800"><div class="w-full max-w-6xl p-8 rounded-3xl shadow-neumorphic-out"><h1 class="text-4xl font-extrabold text-center mb-10 tracking-tight text-indigo-700">AetherSynth</h1><div class="flex items-center justify-between mb-8"><div class="flex items-center space-x-4"><button id="master-play-btn" class="w-20 h-20 rounded-full flex items-center justify-center shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-200 focus:outline-none"><svg id="play-icon" class="w-10 h-10 text-indigo-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg><svg id="stop-icon" class="w-10 h-10 text-red-500 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg></button><div class="text-lg font-semibold text-indigo-600">Master Volume</div><input type="range" id="master-volume-slider" min="0" max="1" value="0.5" step="0.01" class="w-48"></div><div id="audio-visualizer" class="w-32 h-32 rounded-full shadow-neumorphic-out flex items-center justify-center transition-all duration-100 ease-out"><div class="w-24 h-24 rounded-full bg-indigo-500 opacity-70 blur-md"></div></div></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-8"><div class="p-6 rounded-2xl shadow-neumorphic-out"><h2 class="text-2xl font-bold mb-4 text-indigo-600">Oscillator</h2><div class="mb-4"><label class="block text-sm font-medium text-gray-600 mb-2">Waveform</label><div class="grid grid-cols-2 gap-3"><button id="wave-sine" class="waveform-btn p-3 rounded-xl shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-200 text-indigo-500 font-semibold data-[active='true']:shadow-neumorphic-in data-[active='true']:text-indigo-700" data-waveform="sine">Sine</button><button id="wave-square" class="waveform-btn p-3 rounded-xl shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-200 text-indigo-500 font-semibold" data-waveform="square">Square</button><button id="wave-sawtooth" class="waveform-btn p-3 rounded-xl shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-200 text-indigo-500 font-semibold" data-waveform="sawtooth">Sawtooth</button><button id="wave-triangle" class="waveform-btn p-3 rounded-xl shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-200 text-indigo-500 font-semibold" data-waveform="triangle">Triangle</button></div></div></div><div class="p-6 rounded-2xl shadow-neumorphic-out"><h2 class="text-2xl font-bold mb-4 text-indigo-600">Filter</h2><div class="mb-4"><label for="filter-cutoff" class="block text-sm font-medium text-gray-600 mb-2">Cutoff Frequency</label><input type="range" id="filter-cutoff" min="50" max="20000" value="20000" step="10"></div><div><label for="filter-q" class="block text-sm font-medium text-gray-600 mb-2">Resonance (Q)</label><input type="range" id="filter-q" min="0.1" max="20" value="1" step="0.1"></div></div><div class="p-6 rounded-2xl shadow-neumorphic-out"><h2 class="text-2xl font-bold mb-4 text-indigo-600">ADSR Envelope</h2><div class="mb-2"><label for="adsr-attack" class="block text-sm font-medium text-gray-600 mb-1">Attack</label><input type="range" id="adsr-attack" min="0.01" max="2" value="0.05" step="0.01"></div><div class="mb-2"><label for="adsr-decay" class="block text-sm font-medium text-gray-600 mb-1">Decay</label><input type="range" id="adsr-decay" min="0.01" max="2" value="0.1" step="0.01"></div><div class="mb-2"><label for="adsr-sustain" class="block text-sm font-medium text-gray-600 mb-1">Sustain</label><input type="range" id="adsr-sustain" min="0" max="1" value="0.7" step="0.01"></div><div class="mb-2"><label for="adsr-release" class="block text-sm font-medium text-gray-600 mb-1">Release</label><input type="range" id="adsr-release" min="0.01" max="5" value="0.5" step="0.01"></div></div></div><div class="p-6 rounded-2xl shadow-neumorphic-out mb-8"><h2 class="text-2xl font-bold mb-4 text-indigo-600">Effects</h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"><div><label class="block text-sm font-medium text-gray-600 mb-2">Delay</label><label class="toggle-switch"><input type="checkbox" id="delay-toggle"><span class="toggle-slider"></span></label><input type="range" id="delay-time" min="0" max="1" value="0.3" step="0.01" class="mt-3"><label for="delay-time" class="block text-xs text-gray-500 mt-1">Time</label><input type="range" id="delay-feedback" min="0" max="0.9" value="0.4" step="0.01" class="mt-3"><label for="delay-feedback" class="block text-xs text-gray-500 mt-1">Feedback</label></div><div><label class="block text-sm font-medium text-gray-600 mb-2">Reverb</label><label class="toggle-switch"><input type="checkbox" id="reverb-toggle"><span class="toggle-slider"></span></label><input type="range" id="reverb-mix" min="0" max="1" value="0.3" step="0.01" class="mt-3"><label for="reverb-mix" class="block text-xs text-gray-500 mt-1">Mix</label></div></div></div><div class="p-6 rounded-2xl shadow-neumorphic-out"><h2 class="text-2xl font-bold mb-4 text-indigo-600">Keyboard</h2><div id="synth-keyboard" class="flex justify-center space-x-2"><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="C3">C3</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="D3">D3</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="E3">E3</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="F3">F3</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="G3">G3</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="A3">A3</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="B3">B3</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="C4">C4</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="D4">D4</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="E4">E4</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="F4">F4</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="G4">G4</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="A4">A4</button><button class="key-btn w-12 h-24 rounded-lg shadow-neumorphic-out hover:shadow-neumorphic-in transition-all duration-100 flex items-end justify-center pb-2 text-sm font-semibold text-gray-700" data-note="B4">B4</button></div></div></div></div>
    <script>
        // Self-contained logic loop
        (function() {
            let audioContext; let masterGainNode; let masterInputGain; let filterNode; let delayNode, delayFeedbackGain, delayWetGain; let reverbNode, reverbWetGain; let analyserNode; let dataArray; let bufferLength; let currentWaveform = 'sine'; let isPlaying = false; const activeOscillators = new Map(); let attackTime = 0.05; let decayTime = 0.1; let sustainLevel = 0.7; let releaseTime = 0.5; const masterPlayBtn = document.getElementById('master-play-btn'); const playIcon = document.getElementById('play-icon'); const stopIcon = document.getElementById('stop-icon'); const masterVolumeSlider = document.getElementById('master-volume-slider'); const audioVisualizer = document.getElementById('audio-visualizer'); const visualizerInner = audioVisualizer ? audioVisualizer.querySelector('div') : null; const waveformButtons = document.querySelectorAll('.waveform-btn'); const filterCutoffSlider = document.getElementById('filter-cutoff'); const filterQSlider = document.getElementById('filter-q'); const adsrAttackSlider = document.getElementById('adsr-attack'); const adsrDecaySlider = document.getElementById('adsr-decay'); const adsrSustainSlider = document.getElementById('adsr-sustain'); const adsrReleaseSlider = document.getElementById('adsr-release'); const delayToggle = document.getElementById('delay-toggle'); const delayTimeSlider = document.getElementById('delay-time'); const delayFeedbackSlider = document.getElementById('delay-feedback'); const reverbToggle = document.getElementById('reverb-toggle'); const reverbMixSlider = document.getElementById('reverb-mix'); const keyButtons = document.querySelectorAll('.key-btn'); const noteFrequencies = { 'C3': 130.81, 'C#3': 138.59, 'D3': 146.83, 'D#3': 155.56, 'E3': 164.81, 'F3': 174.61, 'F#3': 184.99, 'G3': 196.00, 'G#3': 207.65, 'A3': 220.00, 'A#3': 233.08, 'B3': 246.94, 'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13, 'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00, 'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88, 'C5': 523.25 }; function createImpulseResponse(ctx, duration, decay, reverse) { const sampleRate = ctx.sampleRate; const length = sampleRate * duration; const impulse = ctx.createBuffer(2, length, sampleRate); const impulseL = impulse.getChannelData(0); const impulseR = impulse.getChannelData(1); const random = Math.random; for (let i = 0; i < length; i++) { let n = reverse ? length - i : i; impulseL[i] = (random() * 2 - 1) * Math.pow(1 - n / length, decay); impulseR[i] = (random() * 2 - 1) * Math.pow(1 - n / length, decay); } return impulse; } function initAudioContext() { if (audioContext) return; audioContext = new (window.AudioContext || window.webkitAudioContext)(); masterGainNode = audioContext.createGain(); if (masterVolumeSlider) masterGainNode.gain.value = parseFloat(masterVolumeSlider.value); masterInputGain = audioContext.createGain(); masterInputGain.gain.value = 1; filterNode = audioContext.createBiquadFilter(); filterNode.type = 'lowpass'; if (filterCutoffSlider) filterNode.frequency.value = parseFloat(filterCutoffSlider.value); if (filterQSlider) filterNode.Q.value = parseFloat(filterQSlider.value); delayNode = audioContext.createDelay(1.0); delayFeedbackGain = audioContext.createGain(); delayWetGain = audioContext.createGain(); delayNode.delayTime.value = delayTimeSlider ? parseFloat(delayTimeSlider.value) : 0.3; delayFeedbackGain.gain.value = delayFeedbackSlider ? parseFloat(delayFeedbackSlider.value) : 0.4; delayWetGain.gain.value = 0; delayNode.connect(delayFeedbackGain); delayFeedbackGain.connect(delayNode); delayNode.connect(delayWetGain); reverbNode = audioContext.createConvolver(); reverbWetGain = audioContext.createGain(); reverbNode.buffer = createImpulseResponse(audioContext, 2, 2, false); reverbWetGain.gain.value = 0; analyserNode = audioContext.createAnalyser(); analyserNode.fftSize = 256; bufferLength = analyserNode.frequencyBinCount; dataArray = new Uint8Array(bufferLength); filterNode.connect(masterInputGain); masterInputGain.connect(masterGainNode); masterInputGain.connect(delayNode); masterInputGain.connect(reverbNode); delayWetGain.connect(masterGainNode); reverbWetGain.connect(masterGainNode); masterGainNode.connect(analyserNode); analyserNode.connect(audioContext.destination); if (delayToggle && delayToggle.checked) { delayWetGain.gain.setValueAtTime(1, audioContext.currentTime); } if (reverbToggle && reverbToggle.checked) { reverbWetGain.gain.setValueAtTime(reverbMixSlider ? parseFloat(reverbMixSlider.value) : 0.3, audioContext.currentTime); } drawVisualizer(); } function togglePlayback() { if (!audioContext) { initAudioContext(); } if (audioContext.state === 'suspended') { audioContext.resume(); isPlaying = true; } else if (audioContext.state === 'running') { audioContext.suspend(); isPlaying = false; } if (masterPlayBtn && playIcon && stopIcon) { if (isPlaying) { playIcon.classList.add('hidden'); stopIcon.classList.remove('hidden'); masterPlayBtn.classList.add('shadow-neumorphic-in'); masterPlayBtn.classList.remove('shadow-neumorphic-out'); } else { playIcon.classList.remove('hidden'); stopIcon.classList.add('hidden'); masterPlayBtn.classList.add('shadow-neumorphic-out'); masterPlayBtn.classList.remove('shadow-neumorphic-in'); } } } function startNote(note, element) { if (!audioContext) initAudioContext(); if (audioContext.state === 'suspended') audioContext.resume(); if (activeOscillators.has(note)) return; const freq = noteFrequencies[note]; if (!freq) return; const oscillator = audioContext.createOscillator(); const gainNode = audioContext.createGain(); oscillator.type = currentWaveform; oscillator.frequency.setValueAtTime(freq, audioContext.currentTime); oscillator.connect(gainNode); gainNode.connect(filterNode); gainNode.gain.setValueAtTime(0.0001, audioContext.currentTime); gainNode.gain.linearRampToValueAtTime(1, audioContext.currentTime + attackTime); gainNode.gain.linearRampToValueAtTime(sustainLevel, audioContext.currentTime + attackTime + decayTime); oscillator.start(audioContext.currentTime); activeOscillators.set(note, { oscillator, gainNode, element }); if (element) element.classList.add('key-pressed'); } function stopNote(note) { if (!audioContext || !activeOscillators.has(note)) return; const { oscillator, gainNode, element } = activeOscillators.get(note); const currentTime = audioContext.currentTime; gainNode.gain.cancelScheduledValues(currentTime); gainNode.gain.setValueAtTime(gainNode.gain.value, currentTime); gainNode.gain.linearRampToValueAtTime(0.0001, currentTime + releaseTime); oscillator.stop(currentTime + releaseTime + 0.1); oscillator.onended = () => { oscillator.disconnect(); gainNode.disconnect(); }; activeOscillators.delete(note); if (element) element.classList.remove('key-pressed'); } function drawVisualizer() { if (!analyserNode || !visualizerInner) { requestAnimationFrame(drawVisualizer); return; } analyserNode.getByteFrequencyData(dataArray); let sum = 0; for (let i = 0; i < bufferLength; i++) { sum += dataArray[i]; } let average = sum / bufferLength; const scale = average / 255; const glowIntensity = Math.min(1, scale * 2); const blurRadius = 10 + (glowIntensity * 20); const spreadRadius = 5 + (glowIntensity * 15); visualizerInner.style.boxShadow = `0 0 ${blurRadius}px ${spreadRadius}px rgba(99, 102, 241, ${glowIntensity * 0.8})`; visualizerInner.style.transform = `scale(${1 + glowIntensity * 0.1})`; requestAnimationFrame(drawVisualizer); } document.addEventListener('DOMContentLoaded', () => { const initialWaveformBtn = document.querySelector(`.waveform-btn[data-waveform="${currentWaveform}"]`); if (initialWaveformBtn) { initialWaveformBtn.setAttribute('data-active', 'true'); initialWaveformBtn.classList.add('shadow-neumorphic-in', 'text-indigo-700'); initialWaveformBtn.classList.remove('shadow-neumorphic-out', 'text-indigo-500'); } if (masterPlayBtn) { masterPlayBtn.addEventListener('click', togglePlayback); } if (masterVolumeSlider) { masterVolumeSlider.addEventListener('input', (e) => { if (masterGainNode) { masterGainNode.gain.value = parseFloat(e.target.value); } }); } waveformButtons.forEach(button => { button.addEventListener('click', () => { if (!audioContext) initAudioContext(); waveformButtons.forEach(btn => { btn.setAttribute('data-active', 'false'); btn.classList.add('shadow-neumorphic-out', 'text-indigo-500'); btn.classList.remove('shadow-neumorphic-in', 'text-indigo-700'); }); button.setAttribute('data-active', 'true'); button.classList.add('shadow-neumorphic-in', 'text-indigo-700'); button.classList.remove('shadow-neumorphic-out', 'text-indigo-500'); currentWaveform = button.dataset.waveform; activeOscillators.forEach(({ oscillator }) => { if (oscillator) oscillator.type = currentWaveform; }); }); }); if (filterCutoffSlider) { filterCutoffSlider.addEventListener('input', (e) => { if (filterNode) { filterNode.frequency.value = parseFloat(e.target.value); } }); } if (filterQSlider) { filterQSlider.addEventListener('input', (e) => { if (filterNode) { filterNode.Q.value = parseFloat(e.target.value); } }); } if (adsrAttackSlider) { adsrAttackSlider.addEventListener('input', (e) => attackTime = parseFloat(e.target.value)); } if (adsrDecaySlider) { adsrDecaySlider.addEventListener('input', (e) => decayTime = parseFloat(e.target.value)); } if (adsrSustainSlider) { adsrSustainSlider.addEventListener('input', (e) => sustainLevel = parseFloat(e.target.value)); } if (adsrReleaseSlider) { adsrReleaseSlider.addEventListener('input', (e) => releaseTime = parseFloat(e.target.value)); } if (delayToggle) { delayToggle.addEventListener('change', (e) => { if (!audioContext) initAudioContext(); if (delayWetGain) { if (e.target.checked) { delayWetGain.gain.setValueAtTime(1, audioContext.currentTime); } else { delayWetGain.gain.setValueAtTime(0, audioContext.currentTime); } } }); } if (delayTimeSlider) { delayTimeSlider.addEventListener('input', (e) => { if (delayNode) delayNode.delayTime.value = parseFloat(e.target.value); }); } if (delayFeedbackSlider) { delayFeedbackSlider.addEventListener('input', (e) => { if (delayFeedbackGain) delayFeedbackGain.gain.value = parseFloat(e.target.value); }); } if (reverbToggle) { reverbToggle.addEventListener('change', (e) => { if (!audioContext) initAudioContext(); if (reverbWetGain && reverbMixSlider) { if (e.target.checked) { reverbWetGain.gain.setValueAtTime(parseFloat(reverbMixSlider.value), audioContext.currentTime); } else { reverbWetGain.gain.setValueAtTime(0, audioContext.currentTime); } } }); } if (reverbMixSlider) { reverbMixSlider.addEventListener('input', (e) => { if (reverbWetGain && reverbToggle && reverbToggle.checked) { const mixValue = parseFloat(e.target.value); reverbWetGain.gain.setValueAtTime(mixValue, audioContext.currentTime); } }); } keyButtons.forEach(button => { const note = button.dataset.note; if (note) { button.addEventListener('mousedown', () => startNote(note, button)); button.addEventListener('mouseup', () => stopNote(note)); button.addEventListener('mouseleave', () => stopNote(note)); button.addEventListener('touchstart', (e) => { e.preventDefault(); startNote(note, button); }, { passive: false }); button.addEventListener('touchend', (e) => { e.preventDefault(); stopNote(note); }); button.addEventListener('touchcancel', (e) => { e.preventDefault(); stopNote(note); }); } }); const keyMap = { 'a': 'C3', 's': 'D3', 'd': 'E3', 'f': 'F3', 'g': 'G3', 'h': 'A3', 'j': 'B3', 'k': 'C4', 'l': 'D4', ';': 'E4', "'": 'F4', 'z': 'C4', 'x': 'D4', 'c': 'E4', 'v': 'F4', 'b': 'G4', 'n': 'A4', 'm': 'B4', ',': 'C5' }; const pressedKeys = new Set(); document.addEventListener('keydown', (e) => { if (e.repeat) return; const note = keyMap[e.key.toLowerCase()]; if (note && !pressedKeys.has(note)) { const keyElement = document.querySelector(`.key-btn[data-note="${note}"]`); startNote(note, keyElement); pressedKeys.add(note); } }); document.addEventListener('keyup', (e) => { const note = keyMap[e.key.toLowerCase()]; if (note && pressedKeys.has(note)) { stopNote(note); pressedKeys.delete(note); } }); });
        })();
    </script>
